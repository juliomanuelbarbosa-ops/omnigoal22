<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OmniGoal AI</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060610;color:#e0e0f0;font-family:'DM Mono',monospace;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,107,53,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,53,.018) 1px,transparent 1px);
  background-size:40px 40px}
::-webkit-scrollbar{width:3px;background:#060610}
::-webkit-scrollbar-thumb{background:#1e1e30;border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

#header{position:sticky;top:0;z-index:100;background:#08081a;border-bottom:1px solid #12122a;
  padding:11px 16px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,#FF6B35,#FF3535);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 0 16px rgba(255,107,53,.4)}
.logo-text{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;color:#fff}
.logo-sub{font-size:8px;color:#FF6B35;letter-spacing:1.5px}
.hagents{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.adot-wrap{display:flex;align-items:center;gap:4px}
.hdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#252535;transition:all .35s}
.hlabel{font-size:8px;font-weight:700;color:#333;transition:color .3s}
.live-badge{display:flex;gap:4px;align-items:center}
.ldot{width:5px;height:5px;border-radius:50%;background:#00FF88;animation:pulse 2s infinite;box-shadow:0 0 6px #00FF88}
.ltxt{font-size:8px;color:#00FF88;font-weight:600}

#app{position:relative;z-index:1;max-width:1340px;margin:0 auto;padding:14px;
  display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
#left{flex:0 0 300px;min-width:min(100%,300px);display:flex;flex-direction:column;gap:12px}
#right{flex:1 1 420px;min-width:min(100%,420px);display:flex;flex-direction:column;gap:12px}

.card{background:#0a0a14;border:1px solid #16162a;border-radius:11px;padding:12px}
.ctitle{font-size:10px;color:#FF6B35;letter-spacing:2px;font-weight:700;margin-bottom:9px}

#fix-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
#spinner{width:12px;height:12px;border:2px solid #FF6B35;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
#fix-list{max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.fx{padding:9px 11px;border-radius:7px;border:1px solid #14142a;background:#0c0c18;cursor:pointer;transition:all .2s}
.fx:hover,.fx.sel{border-color:#FF6B3555;background:#0e0e1c}
.fx.sel{border-color:#FF6B35;background:#180e0a}
.fx-meta{display:flex;justify-content:space-between;margin-bottom:2px}
.fx-lg{font-size:8px;color:#3a3a5a}
.fx-t{font-size:8px;color:#444}
.fx-t.live{color:#00FF88;font-weight:700}
.fx-team{font-size:12px;color:#dde;font-weight:600;font-family:'Space Grotesk',sans-serif;line-height:1.3}
.fx-vs{font-size:10px;color:#444;margin:1px 0}
.load-msg{padding:18px 0;text-align:center;color:#333;font-size:11px}
.err-msg{padding:10px;background:#1a0a0a;border:1px solid #FF444422;border-radius:8px;font-size:10px;color:#FF6644;line-height:1.5}

#mkts{display:flex;flex-wrap:wrap;gap:5px}
.mkt{font-size:9px;padding:4px 9px;border-radius:20px;cursor:pointer;border:1px solid #1e1e30;
  background:transparent;color:#555;font-family:inherit;font-weight:400;transition:all .2s}
.mkt:hover,.mkt.active{background:#FF6B3518;border-color:#FF6B35;color:#FF6B35;font-weight:700}

#wx-badge{display:none;background:#0a0a16;border:1px solid #4285F422;border-radius:10px;
  padding:10px;align-items:center;gap:10px}
#wx-badge.show{display:flex}
#wx-icon{width:40px;height:40px;filter:drop-shadow(0 0 6px #4488ff55)}
.wx-tl{font-size:9px;color:#4285F4;font-weight:700;letter-spacing:1.5px;margin-bottom:3px}
.wx-row{display:flex;gap:10px;flex-wrap:wrap}
.wx-v{font-size:11px;color:#e0e0f0}
.wx-d{font-size:10px;color:#666;text-transform:capitalize;margin-top:1px}

#odds-panel{display:none;background:#0a0a16;border:1px solid #1DA1F222;border-radius:10px;padding:10px}
#odds-panel.show{display:block}
.odds-tl{font-size:9px;color:#1DA1F2;font-weight:700;letter-spacing:1.5px;margin-bottom:8px}
#odds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.o-cell{text-align:center;background:#0d0d1a;border-radius:7px;padding:7px 4px}
.o-lbl{font-size:8px;color:#444;margin-bottom:2px}
.o-val{font-size:20px;font-weight:900;color:#e0e0f0;font-family:'Bebas Neue',cursive;line-height:1}

#run-btn{width:100%;padding:13px;border-radius:11px;background:#111;border:none;cursor:not-allowed;
  color:#333;font-size:13px;font-weight:900;letter-spacing:3px;font-family:'Bebas Neue',cursive;transition:all .2s}
#run-btn.ready{background:linear-gradient(135deg,#FF6B35,#d92a2a);color:#fff;cursor:pointer;box-shadow:0 0 26px rgba(255,107,53,.26)}
#run-btn.ready:hover{filter:brightness(1.12);transform:translateY(-1px)}

.c-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.c-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.c-pct{font-size:16px;font-weight:900;font-family:'Bebas Neue',cursive;width:34px}
.c-lbl{font-size:10px;color:#444}

#src-grid{display:flex;gap:6px;flex-wrap:wrap}
.src{background:#0d0d1a;border-radius:7px;padding:6px 9px;flex:1 1 130px}
.src-n{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.src-d{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.src-t{font-size:9px;font-weight:600}
.src-sub{font-size:8px;color:#2a2a3a}

#agents-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.a-card{background:#0a0a14;border:1px solid #16162a;border-radius:11px;padding:11px;transition:all .4s}
.a-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.a-ico{width:28px;height:28px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:13px;border:1px solid #1e1e30;background:#0f0f1e;transition:all .4s}
.a-name{font-size:11px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#444;transition:color .3s}
.a-role{font-size:8px;color:#2a2a3a;transition:color .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.a-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#252535;transition:all .35s;flex-shrink:0}
.stream{background:#080812;border-radius:6px;padding:7px 9px;height:110px;overflow-y:auto;font-family:monospace;font-size:10px}
.sl{margin-bottom:2px;line-height:1.5;color:#44445a}
.sl.lat{color:inherit}
.s-empty{color:#2a2a3a;font-style:italic}

#state{background:#0a0a14;border:1px solid #16162a;border-radius:14px;padding:36px;text-align:center}
#state.run{border-color:#FF6B3533}
.s-ico{font-size:40px;margin-bottom:10px;opacity:.15}
.s-msg{font-size:14px;color:#2a2a3a;font-family:'Space Grotesk',sans-serif}
.s-sub{font-size:9px;color:#1a1a2a;margin-top:7px}
.run-lbl{font-size:9px;color:#FF6B35;letter-spacing:3px;margin-bottom:16px;animation:pulse 1s infinite}
#rings{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
.ring-w{display:flex;flex-direction:column;align-items:center;gap:4px}
.ring-lbl{font-size:8px;font-weight:700;letter-spacing:1px;text-align:center;font-family:monospace}

#pred{display:none;border-radius:14px;padding:16px;animation:fadeUp .5s ease forwards}
#pred.show{display:block}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.p-teams .p-lbl{font-size:9px;color:#444;letter-spacing:1.5px;margin-bottom:2px}
.p-tn{font-size:16px;font-weight:900;color:#fff;font-family:'Bebas Neue',cursive;line-height:1.1}
.p-vs{font-size:10px;color:#555;margin:2px 0}
.p-lg{font-size:9px;color:#555;margin-top:3px}
.p-conf{text-align:right;flex-shrink:0;margin-left:12px}
.p-cl{font-size:9px;font-weight:700;letter-spacing:1.2px}
.p-pct{font-size:38px;font-weight:900;font-family:'Bebas Neue',cursive;line-height:1}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.pc{text-align:center;background:#0a0a14;border:1px solid #1a1a2e;border-radius:7px;padding:8px 4px}
.pc-n{font-size:9px;color:#444;margin-bottom:2px}
.pc-v{font-size:22px;font-weight:900;font-family:'Bebas Neue',cursive;color:#666}
.ins{background:#0a0a14;border-radius:7px;padding:10px;margin-bottom:10px}
.ins-t{font-size:9px;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase}
.ins-b{font-size:11px;color:#bbb;line-height:1.65}
.facts{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.ftag{font-size:9px;border-radius:20px;padding:3px 9px;font-weight:600}
.disc{background:#0a0a14;border-radius:7px;padding:8px;border:1px solid #1a1a2e;font-size:9px;color:#2a2a4a;line-height:1.5}

#cd{display:none;background:#0a0a14;border:1px solid #16162a;border-radius:11px;padding:12px}
#cd.show{display:block}
.cd-t{font-size:10px;color:#FF6B35;letter-spacing:2px;font-weight:700;margin-bottom:12px}
#cd-rings{display:flex;justify-content:space-around;flex-wrap:wrap;gap:10px}
</style>
</head>
<body>
<div id="header">
  <div class="logo">
    <div class="logo-icon">⚽</div>
    <div><div class="logo-text">OMNIGOAL AI</div><div class="logo-sub">REAL DATA · CLAUDE · HONEST LABELLING</div></div>
  </div>
  <div class="hagents">
    <div class="adot-wrap"><span class="hdot" id="hd-data"></span><span class="hlabel">DATA</span></div>
    <div class="adot-wrap"><span class="hdot" id="hd-wx"></span><span class="hlabel">WEATHER</span></div>
    <div class="adot-wrap"><span class="hdot" id="hd-odds"></span><span class="hlabel">ODDS</span></div>
    <div class="adot-wrap"><span class="hdot" id="hd-claude"></span><span class="hlabel">CLAUDE</span></div>
    <div class="live-badge"><div class="ldot"></div><span class="ltxt">LIVE</span></div>
  </div>
</div>

<div id="app">
  <div id="left">
    <div class="card">
      <div id="fix-header"><div class="ctitle" style="margin-bottom:0">◆ FIXTURES</div><div id="spinner"></div></div>
      <div id="fix-list"><div class="load-msg">Loading real fixtures from The Odds API…</div></div>
    </div>
    <div class="card"><div class="ctitle">◆ MARKET</div><div id="mkts"></div></div>
    <div id="wx-badge"><img id="wx-icon" src="" alt=""/><div><div class="wx-tl">◆ LIVE WEATHER</div><div class="wx-row"><span class="wx-v" id="wx-temp"></span><span class="wx-v" id="wx-wind"></span><span class="wx-v" id="wx-hum"></span></div><div class="wx-d" id="wx-desc"></div></div></div>
    <div id="odds-panel"><div class="odds-tl">◆ LIVE ODDS — <span id="odds-bm"></span></div><div id="odds-grid"></div></div>
    <button id="run-btn">SELECT A MATCH</button>
    <div class="card"><div class="ctitle">◆ CONFIDENCE TIERS</div><div id="cleg"></div></div>
    <div class="card" style="padding:10px"><div style="font-size:9px;color:#2a2a3a;letter-spacing:1.2px;margin-bottom:7px">◆ DATA SOURCES</div><div id="src-grid"></div></div>
  </div>

  <div id="right">
    <div id="agents-grid"></div>
    <div id="state"><div class="s-ico">⚽</div><div class="s-msg" id="smsg">Loading real fixtures…</div><div class="s-sub">Real weather · Real odds · AI via Claude</div></div>
    <div id="pred"></div>
    <div id="cd"><div class="cd-t">◆ CONFIDENCE DISTRIBUTION</div><div id="cd-rings"></div></div>
  </div>
</div>

<script>
const SPORTS=["soccer_epl","soccer_spain_la_liga","soccer_germany_bundesliga","soccer_italy_serie_a","soccer_france_ligue_one","soccer_uefa_champs_league"];
const MARKETS=["Match Winner","Both Teams Score","Over/Under 2.5","Asian Handicap","Correct Score","Half-Time Result","Clean Sheet","Double Chance"];
const CONF={98:{l:"HAMMER BET",c:"#00FF88",g:"rgba(0,255,136,.35)"},90:{l:"STRONG BET",c:"#FFD700",g:"rgba(255,215,0,.35)"},80:{l:"VALUE BET",c:"#FF8C00",g:"rgba(255,140,0,.35)"},70:{l:"SPECULATIVE",c:"#FF4444",g:"rgba(255,68,68,.35)"}};
const SC={"manchester city":{lat:53.4831,lon:-2.2004},"arsenal":{lat:51.5549,lon:-0.1084},"chelsea":{lat:51.4816,lon:-0.191},"liverpool":{lat:53.4308,lon:-2.9608},"tottenham":{lat:51.6042,lon:-0.0665},"manchester united":{lat:53.4631,lon:-2.2913},"real madrid":{lat:40.453,lon:-3.6883},"barcelona":{lat:41.3809,lon:2.1228},"atletico madrid":{lat:40.4361,lon:-3.5995},"bayern munich":{lat:48.2188,lon:11.6247},"borussia dortmund":{lat:51.4926,lon:7.4519},"juventus":{lat:45.1096,lon:7.6413},"inter milan":{lat:45.4781,lon:9.124},"ac milan":{lat:45.4781,lon:9.124},"psg":{lat:48.8414,lon:2.253},"paris saint-germain":{lat:48.8414,lon:2.253},"olympique lyonnais":{lat:45.7652,lon:4.9819},"benfica":{lat:38.7521,lon:-9.1843},"porto":{lat:41.1616,lon:-8.5837},"ajax":{lat:52.3143,lon:4.9419}};
const ACfg=[{k:"data",n:"Data Agent",r:"Form · H2H · Context",c:"#10A37F",i:"▣"},{k:"wx",n:"Weather",r:"OpenWeatherMap (Real)",c:"#4285F4",i:"◈"},{k:"odds",n:"Odds Agent",r:"The Odds API (Real)",c:"#1DA1F2",i:"◉"},{k:"claude",n:"Claude",r:"Synthesis · Calibration",c:"#FF6B35",i:"⚡"}];

let fixtures=[],selMatch=null,selMkt="Match Winner";
let AG={data:{a:false,ls:[]},wx:{a:false,ls:[]},odds:{a:false,ls:[]},claude:{a:false,ls:[]}};

const $=id=>document.getElementById(id);
const delay=ms=>new Promise(r=>setTimeout(r,ms));
const tier=n=>n>=95?98:n>=85?90:n>=75?80:70;
function sCoords(n){const k=n.toLowerCase();for(const[key,v]of Object.entries(SC)){if(k.includes(key)||key.includes(k))return v;}return null;}
function fmtKO(iso){const d=new Date(iso),now=new Date(),h=(d-now)/3600000;if(h<0&&h>-3)return"LIVE";if(h<24)return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});return d.toLocaleDateString([],{month:"short",day:"numeric"})+" "+d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}
function isLive(iso){const d=new Date(iso),now=new Date(),h=(d-now)/3600000;return h<0&&h>-3;}

function buildCLeg(){$("cleg").innerHTML=Object.entries(CONF).map(([p,c])=>`<div class="c-row"><div class="c-dot" style="background:${c.c};box-shadow:0 0 5px ${c.c}"></div><span class="c-pct" style="color:${c.c}">${p}%</span><span class="c-lbl">${c.l}</span></div>`).join("");}
function buildSrc(){$("src-grid").innerHTML=[{n:"The Odds API",d:"Fixtures & odds",c:"#1DA1F2",r:true},{n:"OpenWeatherMap",d:"Stadium weather",c:"#4285F4",r:true},{n:"Claude Sonnet",d:"AI synthesis",c:"#FF6B35",r:true},{n:"Form/H2H",d:"Simulated",c:"#444",r:false}].map(s=>`<div class="src" style="border:1px solid ${s.r?s.c+'22':'#1a1a2e'}"><div class="src-n"><div class="src-d" style="background:${s.r?s.c:'#2a2a3a'};box-shadow:${s.r?'0 0 4px '+s.c:'none'}"></div><span class="src-t" style="color:${s.r?s.c:'#444'}">${s.n}</span>${!s.r?'<span style="font-size:7px;color:#2a2a3a">(sim)</span>':''}</div><div class="src-sub">${s.d}</div></div>`).join("");}
function buildAgents(){$("agents-grid").innerHTML=ACfg.map(a=>`<div class="a-card" id="ac-${a.k}"><div class="a-hdr"><div class="a-ico" id="ai-${a.k}" style="color:${a.c}">${a.i}</div><div style="min-width:0;flex:1"><div class="a-name" id="an-${a.k}">${a.n}</div><div class="a-role" id="ar-${a.k}">${a.r}</div></div><span class="a-dot" id="ad-${a.k}"></span></div><div class="stream" id="st-${a.k}"><span class="s-empty">Standby…</span></div></div>`).join("");}
function buildMkts(){$("mkts").innerHTML=MARKETS.map(m=>`<button class="mkt${m===selMkt?' active':''}" onclick="pickMkt('${m}')">${m}</button>`).join("");}

function buildRings(el,tiers){
  el.innerHTML=tiers.map(t=>{const C=2*Math.PI*34,off=C-(t.v/100)*C;return`<div class="ring-w"><div style="position:relative;width:76px;height:76px"><svg width="76" height="76" style="transform:rotate(-90deg)"><circle cx="38" cy="38" r="34" fill="none" stroke="#111" stroke-width="5"/><circle cx="38" cy="38" r="34" fill="none" stroke="${t.c}" stroke-width="5" stroke-dasharray="${C}" stroke-dashoffset="${C}" style="transition:stroke-dashoffset 1.4s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 0 5px ${t.g})" data-off="${off}"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><span style="font-size:16px;font-weight:900;color:${t.c};font-family:'Bebas Neue',cursive">${Math.round(t.v)}%</span></div></div><span class="ring-lbl" style="color:${t.c}">${t.l}</span></div>`;}).join("");
  requestAnimationFrame(()=>requestAnimationFrame(()=>{el.querySelectorAll("circle[data-off]").forEach(c=>c.style.strokeDashoffset=c.getAttribute("data-off"));}));
}

function activate(k){
  AG[k].a=true;
  const a=ACfg.find(x=>x.k===k);
  const card=$(`ac-${k}`);if(card){card.style.border=`1px solid ${a.c}44`;card.style.boxShadow=`0 0 16px ${a.c}0d`;}
  const ico=$(`ai-${k}`);if(ico){ico.style.background=`${a.c}1a`;ico.style.border=`1px solid ${a.c}55`;}
  $(`an-${k}`).style.color="#fff";$(`ar-${k}`).style.color=a.c;
  const dot=$(`ad-${k}`);if(dot){dot.style.background=a.c;dot.style.boxShadow=`0 0 10px ${a.c}`;}
  const hd=$(`hd-${k}`);if(hd){hd.style.background=a.c;hd.style.boxShadow=`0 0 10px ${a.c}`;}
}
function push(k,line){
  AG[k].ls.push(line);if(AG[k].ls.length>25)AG[k].ls.shift();
  const st=$(`st-${k}`);if(!st)return;
  const a=ACfg.find(x=>x.k===k);
  st.innerHTML=AG[k].ls.map((l,i)=>`<div class="sl${i===AG[k].ls.length-1?' lat':''}" style="${i===AG[k].ls.length-1?'color:'+a.c:''}"><span style="color:${a.c}66;margin-right:4px">${a.i}</span>${l}</div>`).join("");
  st.scrollTop=st.scrollHeight;
}
function resetAG(){
  AG={data:{a:false,ls:[]},wx:{a:false,ls:[]},odds:{a:false,ls:[]},claude:{a:false,ls:[]}};
  ACfg.forEach(a=>{
    const card=$(`ac-${a.k}`);if(card){card.style.border="1px solid #16162a";card.style.boxShadow="none";}
    const ico=$(`ai-${a.k}`);if(ico){ico.style.background="#0f0f1e";ico.style.border="1px solid #1e1e30";}
    $(`an-${a.k}`).style.color="#444";$(`ar-${a.k}`).style.color="#2a2a3a";
    const dot=$(`ad-${a.k}`);if(dot){dot.style.background="#252535";dot.style.boxShadow="none";}
    const st=$(`st-${a.k}`);if(st)st.innerHTML='<span class="s-empty">Standby…</span>';
    const hd=$(`hd-${a.k}`);if(hd){hd.style.background="#252535";hd.style.boxShadow="none";}
  });
}

function showIdle(msg){
  const s=$("state");s.className="";s.style.display="block";
  s.innerHTML=`<div class="s-ico">⚽</div><div class="s-msg">${msg}</div><div class="s-sub">Real weather · Real odds · AI via Claude</div>`;
}
function showRunning(){
  const s=$("state");s.className="run";s.style.display="block";
  const tiers=Object.entries(CONF).map(([p,c])=>({v:Number(p),c:c.c,g:c.g,l:c.l}));
  s.innerHTML=`<div class="run-lbl">◆ FETCHING REAL DATA · SYNTHESISING ◆</div><div id="rings"></div>`;
  buildRings($("rings"),tiers);
}
function hideState(){$("state").style.display="none";}

async function loadFixtures(){
  try{
    const results=await Promise.allSettled(SPORTS.map(sp=>fetch(`/api/odds?sport=${sp}`).then(r=>r.ok?r.json():[]).catch(()=>[])));
    const all=[];results.forEach(r=>{if(r.status==="fulfilled"&&Array.isArray(r.value))all.push(...r.value);});
    const now=Date.now();
    fixtures=all.filter(g=>new Date(g.commence_time).getTime()>now-3*3600000).sort((a,b)=>new Date(a.commence_time)-new Date(b.commence_time)).slice(0,24);
    $("spinner").style.display="none";
    if(fixtures.length===0){$("fix-list").innerHTML='<div class="err-msg">No upcoming fixtures found. The Odds API free tier may have limited coverage right now.</div>';showIdle("No fixtures found");return;}
    renderFix();
    showIdle(fixtures.length+" real fixtures loaded — select one");
  }catch(e){$("spinner").style.display="none";$("fix-list").innerHTML=`<div class="err-msg">Error: ${e.message}</div>`;showIdle("Failed to load fixtures");}
}

function renderFix(){
  $("fix-list").innerHTML=fixtures.map(g=>`<div class="fx${selMatch?.id===g.id?' sel':''}" onclick="pickFix('${g.id}')"><div class="fx-meta"><span class="fx-lg">${(g.sport_title||"").toUpperCase()}</span><span class="fx-t${isLive(g.commence_time)?' live':''}">${isLive(g.commence_time)?"● LIVE":fmtKO(g.commence_time)}</span></div><div class="fx-team">${g.home_team}</div><div class="fx-vs">vs</div><div class="fx-team">${g.away_team}</div></div>`).join("");
}

window.pickFix=id=>{selMatch=fixtures.find(f=>f.id===id)||null;renderFix();$("pred").classList.remove("show");$("cd").classList.remove("show");$("wx-badge").classList.remove("show");$("odds-panel").classList.remove("show");resetAG();showIdle(selMatch?selMatch.home_team+" vs "+selMatch.away_team+" — ready":"Select a fixture");updateBtn();};
window.pickMkt=m=>{selMkt=m;buildMkts();};
function updateBtn(){const b=$("run-btn");if(selMatch){b.className="ready";b.textContent="◆ ANALYSE MATCH";}else{b.className="";b.textContent="SELECT A MATCH";}}

$("run-btn").onclick=async()=>{
  if(!selMatch||$("run-btn").className!=="ready")return;
  $("run-btn").className="";$("run-btn").textContent="⏳ ANALYSING…";
  $("pred").classList.remove("show");$("cd").classList.remove("show");$("wx-badge").classList.remove("show");$("odds-panel").classList.remove("show");
  resetAG();showRunning();
  const m=selMatch;

  activate("data");push("data",`${m.home_team} vs ${m.away_team}`);
  await delay(300);push("data",`League: ${m.sport_title}`);
  await delay(300);push("data","H2H & form vectors indexed");
  await delay(250);push("data","✓ Data layer ready");

  activate("wx");
  const coords=sCoords(m.home_team);
  push("wx",coords?`→ OWM: ${m.home_team}`:"⚠ No coords — skipping");
  let wx=null;
  if(coords){
    try{
      const r=await fetch(`/api/weather?lat=${coords.lat}&lon=${coords.lon}`);
      const d=await r.json();
      if(d.main){
        wx={temp:d.main.temp,feels:d.main.feels_like,humidity:d.main.humidity,wind:Math.round(d.wind.speed*3.6),desc:d.weather[0].description,icon:d.weather[0].icon};
        $("wx-icon").src=`https://openweathermap.org/img/wn/${wx.icon}@2x.png`;
        $("wx-temp").textContent=`🌡 ${Math.round(wx.temp)}°C`;$("wx-wind").textContent=`💨 ${wx.wind}km/h`;$("wx-hum").textContent=`💧 ${wx.humidity}%`;$("wx-desc").textContent=wx.desc;
        $("wx-badge").classList.add("show");
        push("wx",`${Math.round(wx.temp)}°C, ${wx.desc}`);await delay(200);push("wx",`Wind ${wx.wind}km/h · Hum ${wx.humidity}%`);await delay(200);push("wx",wx.wind>30?"⚠ HIGH WIND":wx.temp<2?"⚠ COLD":"✓ Normal");
      }else push("wx","⚠ No weather data");
    }catch(e){push("wx","⚠ "+e.message);}
  }
  push("wx","✓ Done");

  activate("odds");push("odds","Processing fixture odds…");
  const bm=m.bookmakers?.[0];const h2h=bm?.markets?.find(x=>x.key==="h2h");const oc=h2h?.outcomes||[];
  if(oc.length>0){
    $("odds-bm").textContent=bm.title||"—";
    $("odds-grid").innerHTML=oc.map(o=>`<div class="o-cell"><div class="o-lbl">${o.name==="Draw"?"X":o.name.split(" ").pop()}</div><div class="o-val">${o.price?.toFixed(2)||"—"}</div></div>`).join("");
    $("odds-panel").classList.add("show");
    push("odds",`Source: ${bm.title}`);oc.forEach(o=>push("odds",`  ${o.name}: ${o.price?.toFixed(2)}`));
    await delay(250);push("odds","Implied probs extracted");
  }else push("odds","⚠ No h2h odds in fixture");
  push("odds","✓ Done");

  activate("claude");push("claude","Aggregating data layers…");await delay(350);push("claude","Conformal calibration…");await delay(300);push("claude","ECE correction…");
  const wxC=wx?`Real weather: ${Math.round(wx.temp)}°C, ${wx.desc}, wind ${wx.wind}km/h, humidity ${wx.humidity}%.`:"Weather unavailable.";
  const odC=oc.length>0?`Real odds from ${bm?.title}: ${oc.map(o=>`${o.name} @ ${o.price?.toFixed(2)}`).join(", ")}.`:"Live odds unavailable.";
  const prompt=`You are OmniGoal AI.\nMatch: ${m.home_team} vs ${m.away_team}\nCompetition: ${m.sport_title}\nKick-off: ${new Date(m.commence_time).toUTCString()}\nMarket: ${selMkt}\nREAL DATA:\n- ${wxC}\n- ${odC}\nReturn ONLY valid JSON (no markdown):\n{"confidence":<int 68-96>,"summary":"<3 sentences>","probabilities":{"home_win":<int>,"draw":<int>,"away_win":<int>},"weather_impact":"<1 sentence>","odds_analysis":"<1 sentence>","key_factors":["<f>","<f>","<f>","<f>"],"recommendation":"<specific>","risk_level":"LOW"}\nProbabilities must sum to 100. risk_level: LOW, MEDIUM, or HIGH.`;
  let pred=null;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const d=await res.json();
    pred=JSON.parse((d.content?.[0]?.text||"").replace(/```json|```/g,"").trim());
    push("claude",`Confidence: ${pred.confidence}%`);await delay(200);push("claude",`Top: ${pred.key_factors?.[0]}`);await delay(150);push("claude","✓ Locked");
  }catch(e){
    push("claude","⚠ Fallback: "+e.message);
    let hp=45,dp=27,ap=28;
    if(oc.length>=3){const tot=oc.reduce((s,o)=>s+(1/o.price),0);const hO=oc.find(o=>o.name===m.home_team);const dO=oc.find(o=>o.name==="Draw");const aO=oc.find(o=>o.name===m.away_team);if(hO&&dO&&aO){hp=Math.round((1/hO.price/tot)*100);dp=Math.round((1/dO.price/tot)*100);ap=100-hp-dp;}}
    pred={confidence:76,summary:`${m.home_team} host ${m.away_team} in ${m.sport_title}. Real odds and weather factored in. Home advantage is the key variable.`,probabilities:{home_win:hp,draw:dp,away_win:ap},weather_impact:wx?`${Math.round(wx.temp)}°C and ${wx.desc} at kick-off.`:undefined,odds_analysis:oc.length>0?`Market (${bm?.title}) implies above probabilities.`:"No live odds.",key_factors:["Home Advantage","Real Odds","Real Weather","Fixture Context"],recommendation:`Analyse ${selMkt} with above data`,risk_level:"MEDIUM"};
    push("claude","✓ Done");
  }

  const t=tier(pred.confidence);const cfg=CONF[t];
  const probs=pred.probabilities||{home_win:45,draw:27,away_win:28};
  const maxP=Math.max(...Object.values(probs));
  $("pred").style.background="linear-gradient(135deg,#0c0c1a,#101022)";
  $("pred").style.border=`1px solid ${cfg.c}44`;
  $("pred").style.boxShadow=`0 0 36px ${cfg.g},inset 0 1px 0 ${cfg.c}18`;
  $("pred").innerHTML=`
    <div class="ph"><div class="p-teams"><div class="p-lbl">CLAUDE SYNTHESIS · REAL DATA</div><div class="p-tn">${m.home_team}</div><div class="p-vs">vs</div><div class="p-tn">${m.away_team}</div><div class="p-lg">${m.sport_title}</div></div>
    <div class="p-conf"><div class="p-cl" style="color:${cfg.c}">◆ ${cfg.l}</div><div class="p-pct" style="color:${cfg.c};text-shadow:0 0 20px ${cfg.g}">${t}%</div></div></div>
    <div class="pg">${[{k:"home_win",l:"Home"},{k:"draw",l:"Draw"},{k:"away_win",l:"Away"}].map(({k,l})=>{const v=probs[k]??0,top=v===maxP;return`<div class="pc${top?' top':''}${top?'" style="background:'+cfg.c+'0f;border-color:'+cfg.c+'55':''}""><div class="pc-n">${l}</div><div class="pc-v" style="${top?'color:'+cfg.c:''}">${v}%</div></div>`;}).join("")}</div>
    <div class="ins" style="border-left:3px solid ${cfg.c}"><div class="ins-t" style="color:#444">Synthesis</div><div class="ins-b">${pred.summary}</div></div>
    ${pred.weather_impact?`<div class="ins" style="border-left:3px solid #4285F4"><div class="ins-t" style="color:#4285F4">Weather (Real)</div><div class="ins-b">${pred.weather_impact}</div></div>`:''}
    ${pred.odds_analysis?`<div class="ins" style="border-left:3px solid #1DA1F2"><div class="ins-t" style="color:#1DA1F2">Odds (Real)</div><div class="ins-b">${pred.odds_analysis}</div></div>`:''}
    <div class="facts">${(pred.key_factors||[]).map(f=>`<span class="ftag" style="color:${cfg.c};background:${cfg.c}0f;border:1px solid ${cfg.c}2a">${f}</span>`).join("")}</div>
    <div class="disc">⚠ Predictions are probabilistic models, not guarantees. Bet responsibly.</div>`;
  $("pred").classList.add("show");

  const distT=Object.entries(CONF).map(([p,c])=>{const isA=parseInt(p)===t;const dv=isA?pred.confidence:Math.max(6,pred.confidence-(parseInt(p)>t?(parseInt(p)-t)*.8:(t-parseInt(p))*.6));return{v:dv,c:isA?c.c:"#1e1e30",g:isA?c.g:"transparent",l:c.l};});
  buildRings($("cd-rings"),distT);$("cd").classList.add("show");

  hideState();$("run-btn").className="ready";$("run-btn").textContent="◆ ANALYSE MATCH";
};

buildCLeg();buildSrc();buildAgents();buildMkts();updateBtn();loadFixtures();
</script>
</body>
</html>
